<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1a1a2e" stroke="#648FFF" stroke-width="3"/>

  <!-- Target/crosshair representing "intent" -->
  <circle cx="64" cy="64" r="32" stroke="#648FFF" stroke-width="2.5" fill="none" opacity="0.6"/>
  <circle cx="64" cy="64" r="20" stroke="#648FFF" stroke-width="2" fill="none" opacity="0.4"/>
  <circle cx="64" cy="64" r="6" fill="#DC267F"/>

  <!-- Vertical crosshair line -->
  <line x1="64" y1="28" x2="64" y2="54" stroke="#648FFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="74" x2="64" y2="100" stroke="#648FFF" stroke-width="2" stroke-linecap="round"/>

  <!-- Horizontal crosshair line -->
  <line x1="28" y1="64" x2="54" y2="64" stroke="#648FFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="74" y1="64" x2="100" y2="64" stroke="#648FFF" stroke-width="2" stroke-linecap="round"/>

  <!-- Measurement marks / dependency arrows (3 nodes converging) -->
  <!-- Top-left node -->
  <circle cx="38" cy="38" r="4" fill="#FE6100"/>
  <line x1="41" y1="41" x2="58" y2="58" stroke="#FE6100" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 2"/>

  <!-- Top-right node -->
  <circle cx="90" cy="38" r="4" fill="#FE6100"/>
  <line x1="87" y1="41" x2="70" y2="58" stroke="#FE6100" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 2"/>

  <!-- Bottom node -->
  <circle cx="64" cy="98" r="4" fill="#FE6100"/>
  <line x1="64" y1="94" x2="64" y2="74" stroke="#FE6100" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 2"/>

  <!-- Bar chart element (bottom-right, representing benchmarking) -->
  <rect x="84" y="82" width="6" height="14" rx="1" fill="#785EF0" opacity="0.8"/>
  <rect x="92" y="76" width="6" height="20" rx="1" fill="#785EF0" opacity="0.8"/>
  <rect x="100" y="70" width="6" height="26" rx="1" fill="#785EF0" opacity="0.8"/>
</svg>
