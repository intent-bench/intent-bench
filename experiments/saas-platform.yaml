name: saas-platform
description: >
  Enterprise greenfield experiment: build a multi-tenant SaaS
  platform with organizations, RBAC, projects, resources, billing,
  API keys, webhooks, audit logging, admin console, analytics,
  notifications, search, and usage quotas. 45 requirements with
  dependency depth 16+ and heavy cross-cutting concerns (tenant
  isolation on every endpoint, audit on every mutation). Tests
  whether structured intent is essential for managing enterprise-
  scale requirement complexity.
repo: "none"
treatment: rtmx
agent: claude-code
max_budget_usd: "15.00"
max_wall_clock_seconds: "2400"
test_command: |
  if [ -f Makefile ] && grep -q '^test:' Makefile; then make test
  elif [ -f package.json ]; then npm test
  elif [ -f go.mod ]; then go test ./...
  elif [ -f requirements.txt ] || [ -f pyproject.toml ]; then python3 -m pytest tests/
  elif [ -f Cargo.toml ]; then cargo test
  else echo "No test framework detected" && exit 1
  fi
setup_command: ""
