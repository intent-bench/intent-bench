name: e-commerce
description: >
  Complex greenfield experiment: build an e-commerce REST API with
  users, products, inventory, cart, orders, payments, shipping,
  reviews, notifications, and discount codes. 25 requirements with
  dependency depth 11 and heavy cross-cutting concerns (audit
  logging, input validation). Tests whether structured intent
  helps agents manage deep architectural dependency chains.
repo: "none"
treatment: rtmx
agent: claude-code
max_budget_usd: "10.00"
test_command: |
  if [ -f Makefile ] && grep -q '^test:' Makefile; then make test
  elif [ -f package.json ]; then npm test
  elif [ -f go.mod ]; then go test ./...
  elif [ -f requirements.txt ] || [ -f pyproject.toml ]; then python3 -m pytest tests/
  elif [ -f Cargo.toml ]; then cargo test
  else echo "No test framework detected" && exit 1
  fi
setup_command: ""
