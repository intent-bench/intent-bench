name: rest-api
description: >
  Greenfield REST API with JWT authentication, role-based access control,
  and paginated list endpoints. Standard complexity with cross-cutting
  concerns (auth x validation x data access) that test whether structured
  intent prevents thrashing on interdependent features.
repo: none
treatment: rtmx
agent: claude-code
max_budget_usd: "10.00"
test_command: |
  if [ -f Makefile ]; then make test
  elif [ -f go.mod ]; then go test ./...
  elif [ -f package.json ]; then npm install --silent 2>/dev/null && npm test
  elif [ -f requirements.txt ]; then pip3 install -q -r requirements.txt 2>/dev/null && python3 -m pytest -v
  elif [ -f pyproject.toml ]; then pip3 install -q -e ".[test]" 2>/dev/null && python3 -m pytest -v
  elif [ -f Cargo.toml ]; then cargo test
  else echo "No test runner detected"; exit 1; fi
setup_command: ""
