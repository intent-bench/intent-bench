name: Benchmark

on:
  workflow_dispatch:
    inputs:
      experiment:
        description: "Experiment name (e.g., task-manager, url-shortener)"
        required: true
        type: choice
        options:
          - url-shortener
          - task-manager
          - rest-api
          - cli-tool
          - brownfield
          - rtmx-self
          - go-toml
          - hyperfine
          - csvkit
          - go-yaml
          - structlog
      condition:
        description: "Condition to run"
        required: true
        type: choice
        options:
          - control
          - treatment
      treatment:
        description: "Treatment plugin (ignored for control)"
        required: false
        type: choice
        default: rtmx
        options:
          - rtmx
          - manual-spec
          - test-first
      runs:
        description: "Number of runs (1-10)"
        required: true
        type: number
        default: 5
      agent:
        description: "Agent wrapper (claude-code or aider)"
        required: false
        type: choice
        default: claude-code
        options:
          - claude-code
          - aider
      model:
        description: "Model ID (e.g., claude-sonnet-4-20250514, openai/gpt-4o, ollama/llama3)"
        required: false
        type: string
        default: "claude-sonnet-4-20250514"

concurrency:
  group: benchmark-${{ github.event.inputs.experiment }}-${{ github.event.inputs.condition }}-${{ github.event.inputs.agent }}
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r analysis/requirements.txt

      - name: Install Claude Code CLI
        if: github.event.inputs.agent == 'claude-code'
        run: npm install -g @anthropic-ai/claude-code

      - name: Install aider
        if: github.event.inputs.agent == 'aider'
        run: pip install aider-chat

      - name: Install RTMX CLI (for rtmx treatment)
        if: github.event.inputs.condition == 'treatment' && github.event.inputs.treatment == 'rtmx'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RTMX_VERSION="1.2.0"
          gh release download "v${RTMX_VERSION}" \
            --repo rtmx-ai/rtmx \
            --pattern "rtmx_${RTMX_VERSION}_linux_amd64.tar.gz" \
            --dir /tmp
          tar xzf "/tmp/rtmx_${RTMX_VERSION}_linux_amd64.tar.gz" -C /usr/local/bin rtmx
          rtmx --version

      - name: Configure git identity
        run: |
          git config user.name "intent-bench[bot]"
          git config user.email "intent-bench[bot]@users.noreply.github.com"

      - name: Validate experiment
        run: bash bench.sh validate ${{ github.event.inputs.experiment }}

      - name: Run benchmark
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          ARGS="--condition ${{ github.event.inputs.condition }}"
          ARGS="$ARGS --runs ${{ github.event.inputs.runs }}"
          ARGS="$ARGS --model ${{ github.event.inputs.model }}"
          ARGS="$ARGS --agent ${{ github.event.inputs.agent }}"

          if [[ "${{ github.event.inputs.condition }}" == "treatment" ]]; then
            ARGS="$ARGS --treatment ${{ github.event.inputs.treatment }}"
          fi

          bash bench.sh run ${{ github.event.inputs.experiment }} $ARGS

      - name: Validate ledger
        run: bash lib/csv.sh validate results/summary.csv

      - name: Run analysis
        run: python3 analysis/compare.py results/summary.csv

      - name: Create results branch and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXP="${{ github.event.inputs.experiment }}"
          COND="${{ github.event.inputs.condition }}"
          N="${{ github.event.inputs.runs }}"
          MODEL="${{ github.event.inputs.model }}"
          BRANCH="results/${EXP}-${COND}-$(date +%Y%m%d-%H%M%S)"

          git checkout -b "$BRANCH"
          git add results/summary.csv results/analysis.json
          git commit -m "results: ${EXP} ${COND} N=${N} (${MODEL})"
          git push -u origin "$BRANCH"

          AGENT="${{ github.event.inputs.agent }}"
          printf '## Benchmark Results\n\n- **Experiment**: %s\n- **Condition**: %s\n- **Treatment**: %s\n- **Agent**: %s\n- **Runs**: %s\n- **Model**: %s\n- **Triggered by**: @%s\n\nAuto-generated by the benchmark workflow.\n' \
            "$EXP" "$COND" "${{ github.event.inputs.treatment }}" "$AGENT" "$N" "$MODEL" "${{ github.actor }}" \
            > /tmp/pr-body.md

          gh pr create \
            --title "results: ${EXP} ${COND} N=${N}" \
            --body-file /tmp/pr-body.md

      - name: Upload raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.event.inputs.experiment }}-${{ github.event.inputs.condition }}-${{ github.run_id }}
          path: results/raw/
          retention-days: 30
